{% extends "base.html" %}
{% block content %}

<section class="login-section d-flex justify-content-center align-items-center">

    <div class="login-card">

        <h2 class="text-center mb-4">🌱 Login in Your Account</h2>

        {% if error %}
        <div class="alert alert-danger alert-dismissible fade show">
            {{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success alert-dismissible fade show">
            {{ success }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        <form method="POST">

            <div class="mb-3 input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
            </div>

            <div class="mb-3 input-group">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" name="password" id="password" class="form-control" placeholder="Enter Password"
                    required>
                <button type="button" class="btn btn-outline-light" onclick="togglePassword()">
                    <i class="bi bi-eye" id="toggleIcon"></i>
                </button>
            </div>

            <div class="mb-3 d-flex justify-content-between">
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" name="remember" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">
                        Remember Me
                    </label>
                </div>
                <a href="{{ url_for('forgot_password') }}" class="text-white text-decoration-none">Forgot password?</a>
            </div>

            <button class="btn btn-success w-100">Login</button>

        </form>

        <p class="text-center mt-3">
            Don't have account?
            <a href="{{ url_for('register') }}" class="text-warning">Register</a>
        </p>

    </div>

</section>

<script>
    function togglePassword() {
        var passwordInput = document.getElementById('password');
        var icon = document.getElementById('toggleIcon');

        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            passwordInput.type = "password";
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    }
</script>

{% endblock %}
